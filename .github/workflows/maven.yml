# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches: [ master ]
  # pull_request:
  #   branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    # Project requires JDK 17 (revision = 2026.03-jdk17-SNAPSHOT)
    strategy:
      matrix:
        java: [ '17' ]

    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v3
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: maven

    # yudao-dependencies is a local reactor module, NOT published to any remote repo.
    # Pre-installing it avoids "Non-resolvable import POM" during root POM model-building.
    - name: Pre-install yudao-dependencies BOM
      run: mvn install -f yudao-dependencies/pom.xml -DskipTests -q --no-transfer-progress

    - name: Build with Maven
      run: mvn -B package -pl yudao-server -am -Dmaven.test.skip=true --no-transfer-progress
