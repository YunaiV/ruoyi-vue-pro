server:
  port: 48080

spring:
  autoconfigure:
    # noinspection SpringBootApplicationYaml
    exclude:
      # Druid 独立配置，不需要自动装配
      - com.alibaba.druid.spring.boot.autoconfigure.DruidDataSourceAutoConfigure
      # Quartz 表须手动建好，不自动初始化
      - org.springframework.boot.autoconfigure.quartz.QuartzAutoConfiguration
      # AI 向量库按需手动创建
      - org.springframework.ai.vectorstore.qdrant.autoconfigure.QdrantVectorStoreAutoConfiguration
      - org.springframework.ai.vectorstore.milvus.autoconfigure.MilvusVectorStoreAutoConfiguration
      # 微信公众号 / 小程序 appid 只在 application-local.yaml 里配置，
      # prod 环境不使用微信功能，禁用相关 Bean 避免 appid=null 启动崩溃
      - com.binarywang.spring.starter.wxjava.mp.config.WxMpServiceAutoConfiguration
      - com.binarywang.spring.starter.wxjava.miniapp.config.WxMaServiceAutoConfiguration
  datasource:
    dynamic:
      primary: master
      datasource:
        master:
          url: jdbc:mysql://127.0.0.1:3306/sdsdsdas?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
          username: sdsdsdas
          password: sdsdsdas
        slave:
          lazy: true   # 懒加载，避免从库未配置时启动报错
          url: jdbc:mysql://127.0.0.1:3306/sdsdsdas?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
          username: sdsdsdas
          password: sdsdsdas

  # ⚠️ 本项目使用 Spring Boot 2.7.x，Redis 连接配置前缀是 spring.redis（非 spring.data.redis）
  redis:
    host: 127.0.0.1
    port: 6379
    database: 0
    timeout: 5000ms
    # password:   # 宝塔 Redis 未设 requirepass，留空即可；若设了密码则取消注释并填入
